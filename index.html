<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>IGO Testy</title>
<link rel="manifest" href="manifest.webmanifest">
<style>
:root{
--primary:#dc2626;
--primary2:#b91c1c;
--bg:#0b1020;
--panel:#ffffff;
--text:#111827;
--muted:#64748b;
}
body{
margin:0;
font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
background:linear-gradient(180deg,#0b1020 0,#111827 220px,#f1f5f9 220px);
color:var(--text);
}
.shell{max-width:900px;margin:auto;padding:20px}
.card{
background:var(--panel);
border-radius:20px;
padding:20px;
box-shadow:0 15px 40px rgba(0,0,0,.12);
margin-bottom:20px
}
h1{color:white;margin:0 0 20px;font-size:34px}
button{
background:var(--primary);
border:none;
color:white;
padding:14px 18px;
border-radius:12px;
font-size:16px;
cursor:pointer;
font-weight:700
}
button:hover{background:var(--primary2)}
.answer{
border:1px solid #e2e8f0;
padding:16px;
border-radius:14px;
margin-top:10px;
cursor:pointer;
background:#fff;
}
.answer.correct{background:#e6fffa;border-color:#16a34a}
.answer.wrong{background:#fff1f2;border-color:#dc2626}
</style>
</head>
<body>
<div class="shell">
<h1>Testy IGO</h1>

<div class="card" id="quiz">
<div id="question"></div>
<div id="answers"></div>
<br>
<button onclick="next()">Dalej</button>
</div>

</div>

<script>
const questions=[
{q:"Przykładowe pytanie 1",a:["A","B","C"],c:0},
{q:"Przykładowe pytanie 2",a:["A","B","C"],c:2},
];

let i=0;

function render(){
const q=questions[i];
document.getElementById("question").innerHTML="<b>"+q.q+"</b>";
const a=document.getElementById("answers");
a.innerHTML="";
q.a.forEach((t,idx)=>{
const d=document.createElement("div");
d.className="answer";
d.innerText=t;
d.onclick=()=>{
if(idx===q.c){d.classList.add("correct");}
else{d.classList.add("wrong");}
};
a.appendChild(d);
});
}
function next(){
i++;
if(i>=questions.length)i=0;
render();
}
render();
</script>

<script>
if('serviceWorker' in navigator){
navigator.serviceWorker.register('./service-worker.js');
}
</script>

</body>
</html>
